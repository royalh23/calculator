<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="calc">
      <div class="display">123456789</div>
      <div class="buttons">
        <button class="bigger">Clear</button>
        <button class="blue">÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="blue">×</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="blue">−</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="blue">+</button>
        <button class="zero">0</button>
        <button>,</button>
        <button class="blue">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
